<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Application Submitted - Online Applications for Training at Moata School</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap">
    <style>
        body {
            background-image: url(background_images/rb_28469.png);
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #fef5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background-color: white;
            padding: 40px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .card h1 {
            color: #c62828;
            margin-bottom: 10px;
        }

        .card p {
            color: #444;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background-color: #c62828;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            text-decoration: none;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #8e0000;
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            height: 60px;
        }

        .privacy {
            margin-top: 20px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="logo">
            <img src="img/favicon.png" alt="Moata Logo">
        </div>
        <h1>Thank You!</h1>
        <p>Your application has been successfully submitted. We will get back to you shortly.</p>
        <a href="https://www.moataschool.co.za" class="btn">Back to Home</a>

        <div class="privacy">
            Your information is protected and will only be used for admission purposes in line with our <a
                href="https://www.moataschool.co.za/privacy" style="color:#c62828; text-decoration: underline;">privacy
                policy</a>.
        </div>
    </div>

</body>

</html>
