    <script>
        document.getElementById('citizen').addEventListener('change', function () {
            const citizenStatus = this.value;
            document.getElementById('idField').style.display = citizenStatus === 'Yes' ? 'block' : 'none';
            document.getElementById('passportField').style.display = citizenStatus === 'No' ? 'block' : 'none';
        });

        function validateIDorPassport() {
            const citizenStatus = document.getElementById('citizen').value;
            const idNumber = document.getElementById('idNumber').value;
            const passportNumber = document.getElementById('passportNumber').value;

            let isValid = true;

            if (citizenStatus === 'Yes') {
                if (!/^\d{13}$/.test(idNumber)) {
                    document.getElementById('idNumber').classList.add('error');
                    document.getElementById('idError').style.display = 'block';
                    isValid = false;
                    alert("Please enter a valid 13-digit ID number.");
                } else {
                    document.getElementById('idNumber').classList.remove('error');
                    document.getElementById('idError').style.display = 'none';
                }
            } else if (citizenStatus === 'No') {
                if (!/^\d{9}$/.test(passportNumber)) {
                    document.getElementById('passportNumber').classList.add('error');
                    document.getElementById('passportError').style.display = 'block';
                    isValid = false;
                    alert("Please enter a valid 9-digit passport number.");
                } else {
                    document.getElementById('passportNumber').classList.remove('error');
                    document.getElementById('passportError').style.display = 'none';
                }
            }

            return isValid;
        }

        document.getElementById('submitBtn').addEventListener('click', function () {
            if (!validateIDorPassport()) return; // Prevent submission if ID/Passport is invalid

            const course = document.getElementById('course').value;
            const citizen = document.getElementById('citizen').value;
            const idNumber = document.getElementById('idNumber').value;
            const passportNumber = document.getElementById('passportNumber').value;
            const gender = document.getElementById('gender').value;
            const dob = document.getElementById('dob').value;
            const initials = document.getElementById('initials').value;
            const surname = document.getElementById('surname').value;
            const fullNames = document.getElementById('fullNames').value;
            const email = document.getElementById('email').value;
            const mobile = document.getElementById('mobile').value;
            const address = document.getElementById('address').value;

            if (!course || !citizen || !gender || !dob || !initials || !surname || !fullNames || !email || !mobile || !address ||
                (citizen === 'Yes' && !idNumber) || (citizen === 'No' && !passportNumber)) {
                alert("Please fill in all the required fields.");
                return;
            }

            const body = `
      Course: ${course}<br>
      SA Citizen: ${citizen}<br>
      ${citizen === 'Yes' ? `ID Number: ${idNumber}` : `Passport Number: ${passportNumber}`}<br>
      Gender: ${gender}<br>
      Date of Birth: ${dob}<br>
      Initials: ${initials}<br>
      Surname: ${surname}<br>
      Full Names: ${fullNames}<br>
      Email: ${email}<br>
      Mobile: ${mobile}<br>
      Address: ${address}
    `;

            Email.send({
                SecureToken: "dd2bf18f-09a5-46bb-961d-8dc768301175",
                To: 'messages.semtexagency@outlook.com',
                From: "messages.semtexagency@outlook.com",
                Subject: "New Student Application",
                Body: body
            }).then(
                function () {
                    alert("Application submitted successfully!");
                    document.getElementById("applicationForm").reset();
                }
            ).catch(
                function (error) {
                    alert("There was an error submitting your application, please try again.");
                }
            );
        });
    </script>
